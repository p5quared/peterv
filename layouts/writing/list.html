{{ define "main" }}
<header class="page-title">
  <h1 class="page-title__h1"><em>Writing</em></h1>
  <p class="page-title__deck">Essays and dispatches, in reverse chronological order.</p>
</header>

<div class="writing-list">
{{ range .Pages.GroupByDate "2006" }}
  <div class="year-sep">{{ .Key }}</div>
  {{ range .Pages.ByDate.Reverse }}
  <article class="journal__entry">
    <div class="journal__date">{{ .Date.Format "Jan 02" }}</div>
    <div>
      <h3 class="journal__title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      {{ with .Description }}<p class="journal__desc">{{ . }}</p>{{ end }}
    </div>
  </article>
  {{ end }}
{{ end }}
</div>
{{ end }}
