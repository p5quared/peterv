{{ $section := .Section }}
{{ if .IsHome }}{{ $section = "home" }}{{ end }}
<header class="masthead">
  <a class="masthead__title" href="{{ "/" | relURL }}">
    <span class="masthead__title-main">P<em>!</em></span>
  </a>
  <nav class="nav">
    <a href="{{ "/" | relURL }}"        class="nav__link {{ if eq $section "home" }}is-active{{ end }}">home/</a>
    <a href="{{ "/writing/" | relURL }}" class="nav__link {{ if eq $section "writing" }}is-active{{ end }}">writing/</a>
    <a href="{{ "/reading/" | relURL }}" class="nav__link {{ if eq $section "reading" }}is-active{{ end }}">reading/</a>
    <a href="{{ "/about/" | relURL }}"   class="nav__link {{ if eq $section "about" }}is-active{{ end }}">about/</a>
    <a href="{{ "/resume.pdf" | relURL }}" class="nav__link nav__link--meta" target="_blank" rel="noopener">resume.pdf ↗</a>
  </nav>
  <svg class="masthead__squiggle" width="160" height="12" viewBox="0 0 160 12" aria-hidden="true">
    <path d="M 2 9 Q 20 1, 40 7 T 80 7 T 120 7 T 158 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</header>
