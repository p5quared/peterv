{{- $np := .Site.Data.now_playing -}}
{{- if $np -}}
<div class="now-playing">
  <div class="now-playing__head">
    <span class="now-playing__kicker">♪ on the desk</span>
    {{ with $np.length }}<span class="now-playing__time">{{ . }}</span>{{ end }}
  </div>
  <div class="now-playing__row">
    <div class="now-playing__art" aria-hidden="true">
      {{ if $np.artwork }}
      <img src="{{ $np.artwork }}" alt="" style="width:100%;height:100%;object-fit:cover;">
      {{ else }}
      <svg viewBox="0 0 88 88" width="100%" height="100%">
        <defs>
          <pattern id="np-hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" stroke="currentColor" stroke-width="1.4" opacity="0.55"/>
          </pattern>
        </defs>
        <rect width="88" height="88" fill="url(#np-hatch)"/>
        <text x="50%" y="58%" text-anchor="middle" font-family="EB Garamond, serif" font-style="italic" font-size="34" fill="var(--paper)">&#9835;</text>
      </svg>
      {{ end }}
    </div>
    <div class="now-playing__info">
      <div class="now-playing__title">{{ $np.title }}</div>
      <div class="now-playing__artist">{{ $np.artist }}{{ with $np.album }} · <em>{{ . }}</em>{{ end }}</div>
      <div class="now-playing__bar"><span></span></div>
    </div>
  </div>
</div>
{{- end -}}
