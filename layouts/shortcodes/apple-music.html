{{- $src := .Get "src" -}}
{{- $label := .Get "label" | default "accompaniment" -}}
{{- $caption := .Get "caption" | default "For accompaniment while you read." -}}
<figure class="music-card">
  <div class="music-card__frame">
    <span class="music-card__tab">♪ {{ $label }}</span>
    <iframe height="175" src="{{ $src }}"
      sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
      allow="autoplay *; encrypted-media *; clipboard-write"></iframe>
  </div>
  {{ with $caption }}<figcaption class="music-card__caption">{{ . }}</figcaption>{{ end }}
</figure>
